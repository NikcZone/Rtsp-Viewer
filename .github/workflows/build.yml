name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Scarica go2rtc arm64 e lo impacchetta come libreria nativa nell'APK
      # Android esegue solo binari da nativeLibraryDir — questa è la soluzione corretta
      - name: Download go2rtc ARM64
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          curl -L https://github.com/AlexxIT/go2rtc/releases/download/v1.9.4/go2rtc_linux_arm64 \
               -o app/src/main/jniLibs/arm64-v8a/libgo2rtc.so
          chmod +x app/src/main/jniLibs/arm64-v8a/libgo2rtc.so
          echo "Dimensione: $(du -sh app/src/main/jniLibs/arm64-v8a/libgo2rtc.so)"

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rtsp-viewer-v2
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
